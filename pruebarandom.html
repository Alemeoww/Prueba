<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Aleatorio - Ingeniería de Software</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --bg-color: #f4f7f6;
            --text-color: #333;
            --correct-bg: #d4edda;
            --correct-border: #c3e6cb;
            --correct-text: #155724;
            --incorrect-bg: #f8d7da;
            --incorrect-border: #f5c6cb;
            --incorrect-text: #721c24;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            line-height: 1.6;
        }

        .quiz-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .progress {
            font-size: 0.9em;
            color: #777;
            margin-bottom: 20px;
            text-align: right;
        }

        .question {
            font-size: 1.25em;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: center;
            background: #fdfdfd;
            border: 1px solid #ddd;
            padding: 12px 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .option-label:hover {
            background: #f0f4f8;
            border-color: #b3d4fc;
        }

        .option-label input {
            margin-right: 15px;
            transform: scale(1.2);
            cursor: pointer;
        }

        .btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s;
            display: block;
            width: 100%;
        }

        .btn:hover {
            background: #004494;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            font-weight: 500;
            display: none;
        }

        .correct {
            background: var(--correct-bg);
            border: 1px solid var(--correct-border);
            color: var(--correct-text);
        }

        .incorrect {
            background: var(--incorrect-bg);
            border: 1px solid var(--incorrect-border);
            color: var(--incorrect-text);
        }

        .hidden {
            display: none !important;
        }

        #score-container {
            text-align: center;
        }

        .correct-highlight {
            background: var(--correct-bg) !important;
            border-color: var(--correct-border) !important;
        }

        .incorrect-highlight {
            background: var(--incorrect-bg) !important;
            border-color: var(--incorrect-border) !important;
        }
    </style>
</head>
<body>

    <div class="quiz-container">
        <h1>Simulador Unidad 1 (Modo Aleatorio)</h1>
        
        <div id="quiz-content">
            <div class="progress" id="progress-text">Pregunta 1 de X</div>
            <div class="question" id="question-text">Cargando pregunta...</div>
            <div class="options" id="options-container">
                </div>
            
            <div id="feedback" class="feedback"></div>
            
            <button id="submit-btn" class="btn" onclick="checkAnswer()">Comprobar Respuesta</button>
            <button id="next-btn" class="btn hidden" onclick="nextQuestion()">Siguiente Pregunta</button>
        </div>

        <div id="score-container" class="hidden">
            <h2>¡Prueba Finalizada!</h2>
            <p id="score-text" style="font-size: 1.2em; margin: 20px 0;"></p>
            <button class="btn" onclick="location.reload()">Reiniciar Simulador</button>
        </div>
    </div>

    <script>
        // Función para desordenar arreglos (Algoritmo Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        const rawData = `
1. ¿Cuál es el principal objetivo de la Ingeniería de Software?
A) Programar aplicaciones rápidamente
B) Diseñar hardware eficiente
C) Garantizar software confiable que satisfaga los requisitos del usuario
D) Reducir costos de computación
✅ Respuesta correcta: C

2. ¿En qué año se reconoce el nacimiento formal de la Ingeniería de Software?

B) Pruebas

✅ Respuesta correcta: D

6. ¿Quién es responsable de planificar, coordinar y controlar el proyecto de software?

7. ¿Qué rol se encarga de recolectar y documentar los requisitos del cliente?

D) Desarrollador
✅ Respuesta correcta: B

8. ¿Cuál de los siguientes roles es propio de las metodologías ágiles?

9. ¿Cuál es la principal responsabilidad del Scrum Master?

10. ¿Qué rol es responsable de asegurar la calidad del software mediante pruebas?
A) Analista
B) Tester

11. En la simulación del proyecto de biblioteca, ¿qué herramienta se sugiere para la planificación de tareas?

D) Trello

12. ¿Qué entregable se genera durante la fase de requisitos?
A) Código fuente

C) Documento de especificaciones de requisitos

13. ¿Cuál de los siguientes corresponde a un rol moderno en Ingeniería de Software?

60. ¿Por qué es importante la trazabilidad entre modelos en el desarrollo de software?

`;

        const questions = [];
        const blocks = rawData.trim().split(/\n(?=\d+\.)/); 

        // 1. Extraer todas las preguntas
        blocks.forEach(block => {
            const lines = block.split('\n').filter(l => l.trim() !== '');
            if (lines.length >= 6) {
                // Quitamos el número del inicio de la pregunta para que no se vea raro al desordenarlas
                const rawQText = lines[0].trim();
                const qText = rawQText.replace(/^\d+\.\s*/, ''); 
                
                const optA = lines[1].replace('A)', '').trim();
                const optB = lines[2].replace('B)', '').trim();
                const optC = lines[3].replace('C)', '').trim();
                const optD = lines[4].replace('D)', '').trim();
                
                const correctLine = lines.find(l => l.includes('Respuesta correcta:'));
                const correctLetter = correctLine ? correctLine.split(':')[1].trim() : '';

                questions.push({
                    question: qText,
                    options: { A: optA, B: optB, C: optC, D: optD },
                    correct: correctLetter
                });
            }
        });

        // 2. Desordenar el arreglo principal de preguntas
        shuffleArray(questions);

        let currentIndex = 0;
        let score = 0;

        const questionEl = document.getElementById('question-text');
        const optionsEl = document.getElementById('options-container');
        const submitBtn = document.getElementById('submit-btn');
        const nextBtn = document.getElementById('next-btn');
        const feedbackEl = document.getElementById('feedback');
        const progressEl = document.getElementById('progress-text');

        function loadQuestion() {
            const currentQ = questions[currentIndex];
            questionEl.textContent = currentQ.question;
            progressEl.textContent = `Pregunta ${currentIndex + 1} de ${questions.length}`;
            
            optionsEl.innerHTML = '';
            feedbackEl.className = 'feedback hidden';
            feedbackEl.textContent = '';
            
            submitBtn.classList.remove('hidden');
            submitBtn.disabled = false;
            nextBtn.classList.add('hidden');

            // 3. Convertir las opciones en un arreglo y desordenarlas
            let optionsArray = Object.entries(currentQ.options);
            shuffleArray(optionsArray);

            // 4. Renderizar las opciones desordenadas (sin mostrar la letra A, B, C o D)
            optionsArray.forEach(([originalKey, text]) => {
                const label = document.createElement('label');
                label.className = 'option-label';
                label.id = `label-${originalKey}`;
                
                const input = document.createElement('input');
                input.type = 'radio';
                input.name = 'option';
                input.value = originalKey; // El valor oculto sigue siendo la letra original
                
                label.appendChild(input);
                label.appendChild(document.createTextNode(text)); // Solo mostramos el texto
                optionsEl.appendChild(label);
            });
        }

        function checkAnswer() {
            const selected = document.querySelector('input[name="option"]:checked');
            if (!selected) {
                alert("Por favor, selecciona una respuesta antes de comprobar.");
                return;
            }

            const currentQ = questions[currentIndex];
            const userAnswer = selected.value;
            const isCorrect = userAnswer === currentQ.correct;

            submitBtn.disabled = true;
            submitBtn.classList.add('hidden');
            nextBtn.classList.remove('hidden');

            document.querySelectorAll('input[name="option"]').forEach(input => input.disabled = true);

            const correctLabel = document.getElementById(`label-${currentQ.correct}`);
            const selectedLabel = document.getElementById(`label-${userAnswer}`);
            
            // Obtenemos el texto de la respuesta correcta para mostrarlo en el feedback
            const correctText = currentQ.options[currentQ.correct];

            if (isCorrect) {
                score++;
                feedbackEl.textContent = "✅ ¡Correcto!";
                feedbackEl.className = 'feedback correct';
                selectedLabel.classList.add('correct-highlight');
            } else {
                feedbackEl.textContent = `❌ Incorrecto. La respuesta correcta era: "${correctText}"`;
                feedbackEl.className = 'feedback incorrect';
                selectedLabel.classList.add('incorrect-highlight');
                correctLabel.classList.add('correct-highlight');
            }
            
            if (currentIndex === questions.length - 1) {
                nextBtn.textContent = "Ver Resultados Finales";
            }
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('score-container').classList.remove('hidden');
            
            const percentage = Math.round((score / questions.length) * 100);
            document.getElementById('score-text').innerHTML = `Obtuviste <strong>${score}</strong> respuestas correctas de <strong>${questions.length}</strong> (${percentage}%).`;
        }

        // Iniciar la prueba
        loadQuestion();
    </script>
</body>
</html>
